name: Deploy to Firebase Hosting

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read package.json
        id: package
        run: |
          echo "json=$(cat package.json | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Build
        env:
          CI: false
          REACT_APP_VERSION: ${{ fromJson(steps.package.outputs.json).version }}
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID }}
          REACT_APP_FIREBASE_VAPID_KEY: ${{ secrets.REACT_APP_FIREBASE_VAPID_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: ./build

      - name: Setup Node.js for Functions
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci
        working-directory: ./functions
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase (Hosting, Functions, Firestore Rules)
        run: |
          max_attempts=3
          migration_retry_done=0
          migration_function="onNutritionReferenceChanged"
          migration_region="europe-west10"
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Firebase deploy attempt $attempt/$max_attempts"
            set +e
            deploy_output=$(firebase deploy --only hosting,functions,firestore:rules --project broubook --force 2>&1)
            deploy_exit_code=$?
            set -e
            echo "$deploy_output"

            if [ "$deploy_exit_code" -eq 0 ]; then
              exit 0
            fi

            if [ "$migration_retry_done" -eq 0 ] && echo "$deploy_output" | grep -Eq "\[$migration_function\($migration_region\)\].*HTTPS function to a background triggered function is not allowed"; then
              echo "Detected trigger migration conflict for $migration_function. Deleting legacy function and retrying deploy..."
              set +e
              delete_output=$(firebase functions:delete "$migration_function" --region "$migration_region" --project broubook --force 2>&1)
              delete_exit_code=$?
              set -e
              echo "$delete_output"
              if [ "$delete_exit_code" -ne 0 ]; then
                echo "Failed to delete legacy function $migration_function before retry."
                exit "$delete_exit_code"
              fi
              migration_retry_done=1
              continue
            fi

            if echo "$deploy_output" | grep -Eiq "HTTP Error: 503|Service Unavailable"; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                case "$attempt" in
                  1) sleep_seconds=10 ;;
                  2) sleep_seconds=20 ;;
                  *) sleep_seconds=40 ;;
                esac
                echo "Firebase API returned 503. Retrying in ${sleep_seconds}s..."
                sleep "$sleep_seconds"
                continue
              fi
            fi

            exit "$deploy_exit_code"
          done
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
